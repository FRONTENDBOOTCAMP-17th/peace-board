# 게시글 목록 불러오기,list

<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>리스트 불러오기</title>
    <style>
      .nowStatus {
        color: #666;
        font-style: italic;
      }
      .post-item {
        border-bottom: 1px solid #eee;
        padding: 10px 0;
        list-style: none;
      }
      .post-title {
        font-weight: bold;
        font-size: 1.1em;
      }
      .post-info {
        color: #888;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body style="margin: 50px">
    <h2>게시글 목록</h2>
    <p id="nowStatus" class="nowStatus">불러오는 중...</p>
    <ul id="postList" style="padding: 0"></ul>

    <script>
      const token = localStorage.getItem("accessToken");
      const statusText = document.getElementById("nowStatus");
      const postList = document.getElementById("postList");

      async function loadList() {
        try {
          const res = await fetch(
            "https://api.fullstackfamily.com/api/edu/ws-03a2de/posts",
            {
              method: "GET",
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
              },
            },
          );
          console.log(res);
          if (!res.ok) throw new Error("데이터를 불러오는 데 실패했습니다.");

          const resJson = await res.json();
          console.log(resJson);
          statusText.textContent = "";
          resJson.data.content.forEach((post) => {
            const li = document.createElement("li");
            li.className = "post-item";

            const titleLink = document.createElement("a");
            titleLink.className = "post-title";
            titleLink.style.display = "block";
            titleLink.style.textDecoration = "none"; // 링크 밑줄 제거 (선택)
            titleLink.style.color = "black";

            titleLink.href = `detail.html?id=${post.id}`;
            titleLink.textContent = post.title;

            const infoDiv = document.createElement("div");
            infoDiv.className = "post-info";
            infoDiv.textContent = `작성자: ${post.authorNickname} | 조회수: ${post.viewCount}`;

            const previewP = document.createElement("p");
            previewP.textContent = post.contentPreview;

            li.append(titleLink, infoDiv, previewP);

            postList.appendChild(li);
          });
        } catch (err) {
          console.error(err);
          statusText.textContent = "오류가 발생했습니다: " + err.message;
        }
      }

      loadList();
    </script>
  </body>
</html>
